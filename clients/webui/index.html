<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>parados</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<header>
			<h1>parados</h1>

			<form id="cfg" autocomplete="off">
				<input id="base" type="text" value="http://127.0.0.1:8088">
				<button id="load" type="submit">load</button>
				<span id="status"></span>
			</form>
		</header>

		<main>
			<section id="left">
				<input id="filter" type="text" placeholder="filter...">
				<ul id="list"></ul>
			</section>

			<section id="right">
				<div id="now"></div>

				<audio id="aud" controls preload="metadata"></audio>
				<video id="vid" controls preload="metadata"></video>

				<pre id="meta"></pre>
			</section>
		</main>

		<script src="parados.js"></script>
	</body>
</html>
